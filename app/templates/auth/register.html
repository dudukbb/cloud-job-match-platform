{% extends "base.html" %}
{% block title %}Register — Cloud Job Match{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h3 class="card-title mb-4 text-center">
          <i class="bi bi-person-plus-fill me-2 text-primary"></i>Create Account
        </h3>
        <form method="POST" action="{{ url_for('auth.register') }}" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label" for="username">Username</label>
            <input type="text" class="form-control" id="username" name="username"
                   placeholder="johndoe" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label" for="email">Email address</label>
            <input type="email" class="form-control" id="email" name="email"
                   placeholder="you@example.com" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <input type="password" class="form-control" id="password" name="password"
                   placeholder="Min. 8 characters" required minlength="8">
          </div>
          <div class="mb-3">
            <label class="form-label" for="confirm_password">Confirm Password</label>
            <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                   placeholder="Repeat password" required>
          </div>
          <div class="mb-4">
            <label class="form-label" for="role">Role</label>
            <select class="form-select" id="role" name="role">
              <option value="job_seeker" {% if selected_role != 'employer' %}selected{% endif %}>Job Seeker</option>
              <option value="employer" {% if selected_role == 'employer' %}selected{% endif %}>Employer</option>
            </select>
          </div>
          <div class="mb-4" id="skills-group" {% if selected_role == 'employer' %}style="display: none;"{% endif %}>
            <label class="form-label" for="skills">Skills</label>
            <textarea class="form-control" id="skills" name="skills" rows="3"
                      placeholder="e.g. Python, Flask, Docker, PostgreSQL">{{ request.form.get('skills', '') }}</textarea>
            <div class="form-text">Optional. Used to calculate job match percentage.</div>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
          </div>
        </form>
        <hr>
        <p class="text-center mb-0">
          Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>

<script>
  (function () {
    const roleSelect = document.getElementById("role");
    const skillsGroup = document.getElementById("skills-group");
    if (!roleSelect || !skillsGroup) {
      return;
    }

    function toggleSkills() {
      skillsGroup.style.display = roleSelect.value === "employer" ? "none" : "block";
    }

    roleSelect.addEventListener("change", toggleSkills);
    toggleSkills();
  })();
</script>
{% endblock %}
